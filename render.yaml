# Render Blueprint — deploys the backend as a Docker web service.
# In the Render dashboard: New → Blueprint → connect this repo.
# Set MONGODB_URI, JWT_SECRET (and optionally mail/Twilio) as env vars.
services:
  - type: web
    name: stayease-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SEED_ENABLED
        value: "true"
      - key: MAIL_ENABLED
        value: "false"
      - key: TWILIO_ENABLED
        value: "false"
