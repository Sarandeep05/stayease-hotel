server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: stayease-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/stayease}
      auto-index-creation: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jackson:
    default-property-inclusion: non_null

# Application specific configuration
app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-very-long-random-secret-string-at-least-64-bytes-long-000}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION:86400000}      # 1 day
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}    # 7 days
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*}
  mail:
    from: ${MAIL_FROM:no-reply@stayease.com}
    enabled: ${MAIL_ENABLED:false}
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    from-number: ${TWILIO_FROM_NUMBER:}
    enabled: ${TWILIO_ENABLED:false}
  seed:
    enabled: ${SEED_ENABLED:true}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.springframework.security: INFO
    com.stayease: DEBUG
